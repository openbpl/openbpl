# OpenBPL Configuration

# Brand details for phishing detection.
brand:
  name: "PayPal"
  website: "https://paypal.com"
  description: "PayPal is a digital payments platform that enables online money transfers, payments, and financial services."
  industry: "fintech"
  twitter: ""
  github: ""

  # Keywords used for detection.
  keywords:
    included:
      - paypal
      - paypa1
      - paypai
      # - pp
      - paypl
    excluded: []

  # Brand images (paths on disk for favicon/logo matching).
  images:
    - images/favicon.png

  # Brand colors (hex values).
  colors:
    - "#012169"
    - "#003087"
    - "#009cde"
    - "#0070ba"
    - "#1072eb"
    - "#ffffff"

  # URLs for web assets owned by the brand.
  urls:
    domains:
      - paypal.com
      - www.paypal.com
      - newsroom.paypal-corp.com
      - developer.paypal.com
      - www.paypalobjects.com
    social_media: []
    app_stores: []
    browser_extensions: []
    blogs: []

# Detection source.
source: certstream

# Rules configuration.
rules:
  favicon_match:
    enabled: true
    threshold: 5
  login_form:
    enabled: true
